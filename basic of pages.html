<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;

        }
        .one{
            width: 100vw;
            height: 100vh;
            background-color: rebeccapurple;
        }
        .two{
            width: 100vw;
            height: 2000px;
            position: relative;
            background-image: linear-gradient(black , rgb(11, 11, 49));
        }
        .tt{
            width: 500px;
            height: 500px;
            position: sticky;
            top: 0px;
            margin: 50px;
            background-color: blue;
        }
        .three{
            background-color: aqua;
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>
    <div class="one"></div>
    <div class="two">
        <div class="tt"></div>
    </div>
    <div class="three"></div>
</body>
</html>
